<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Takami — Mi Entrega</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Leaflet & Custom Map Module -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="takami-map.js"></script>
<style>
:root{--bg:#041824;--bg2:#062030;--bg3:#083040;--border:rgba(0,200,232,.15);--border2:rgba(0,200,232,.08);--text:#e8f6ff;--text2:#7aa8be;--text3:#3d6880;--cyan:#00c8e8;--green:#00e676;--gbg:rgba(0,230,118,.08);--amber:#ffab00;--abg:rgba(255,171,0,.08);--red:#ff4d4d;--rbg:rgba(255,77,77,.08);--font:'Barlow Condensed',sans-serif;--body:'Barlow',sans-serif;--r:10px;--r2:14px;}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--body)}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg)}
@media(min-width:500px){body{background:#020e14}.app{border-left:1px solid var(--border);border-right:1px solid var(--border)}}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{font-family:var(--font);font-size:22px;font-weight:800;letter-spacing:1px}.logo span{color:var(--cyan)}
.logout{font-size:11px;font-family:var(--font);color:var(--text3);cursor:pointer;padding:4px 8px;border:1px solid var(--border2);border-radius:4px;transition:all .15s}
.logout:hover{color:var(--red);border-color:var(--red)}
.content{padding:16px}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;font-family:var(--font);letter-spacing:.5px;white-space:nowrap}
.bg{background:var(--gbg);color:var(--green);border:1px solid rgba(0,230,118,.2)}
.ba{background:var(--abg);color:var(--amber);border:1px solid rgba(255,171,0,.2)}
.br{background:var(--rbg);color:var(--red);border:1px solid rgba(255,77,77,.2)}
.bc{background:rgba(0,200,232,.1);color:var(--cyan);border:1px solid rgba(0,200,232,.2)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px;margin-bottom:12px}
.sec{font-size:11px;font-weight:700;font-family:var(--font);letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin:4px 2px 10px}
.eta{background:linear-gradient(135deg,#062030,#083a50);border:1.5px solid var(--cyan);border-radius:var(--r2);padding:18px;margin-bottom:14px;text-align:center}
.tl{position:relative;padding-left:24px;margin-bottom:12px}
.tl-line{position:absolute;left:10px;top:12px;bottom:12px;width:1.5px;background:var(--border)}
.tl-item{position:relative;padding:0 0 20px 20px}
.tl-item:last-child{padding-bottom:0}
.tl-dot{position:absolute;left:-14px;top:4px;width:14px;height:14px;border-radius:50%;border:2px solid var(--bg2)}
.td{background:var(--green);border-color:var(--green)}
.ta{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 0 4px rgba(0,200,232,.2)}
.tp{background:var(--bg3);border-color:var(--border)}
.or{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border2);font-size:13px}
.or:last-child{border-bottom:none}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;display:inline-block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.loading{text-align:center;padding:48px;color:var(--text3);font-family:var(--font);font-size:13px;letter-spacing:2px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--cyan);color:var(--cyan);padding:10px 20px;border-radius:24px;font-size:12px;z-index:400;font-family:var(--font);letter-spacing:1px;box-shadow:0 4px 24px rgba(0,200,232,.2);animation:toastIn .25s ease;white-space:nowrap}
@keyframes toastIn{from{opacity:0;bottom:60px}to{opacity:1;bottom:80px}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">TAKAMI<span>.</span></div>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="text-align:right">
        <div style="font-size:12px;font-family:var(--font);color:var(--text2)" id="cname">—</div>
        <div style="font-size:10px;font-family:var(--font);color:var(--text3)">CLIENTE</div>
      </div>
      <div class="logout" onclick="doLogout()">Salir</div>
    </div>
  </div>
  <div class="content" id="content"><div class="loading">CARGANDO TU ENTREGA...</div></div>
</div>
<script>
const SURL='https://lwdvwwvcshdxfvvsiscc.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3ZHZ3d3Zjc2hkeGZ2dnNpc2NjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1OTYxMjQsImV4cCI6MjA5NTE3MjEyNH0.Yq-5ZrQVnKaGBuMreQUSukNb637I-aJ5xL-NwMboHk0';
const sb=supabase.createClient(SURL,SKEY);

let user=null, truck=null, myDeliveries=[];

(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(!session){location.href='index.html';return;}
  user=JSON.parse(sessionStorage.getItem('takami_user')||'{}');
  if(user.rol!=='cliente'){location.href='index.html';return;}
  document.getElementById('cname').textContent=user.nombre||'Cliente';

  // Load assigned truck
  if(user.camion_id){
    const {data}=await sb.from('camiones').select('*').eq('id',user.camion_id).single();
    if(data)truck=data;
    // Realtime truck updates
    sb.channel('cli-truck')
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'camiones',filter:`id=eq.${user.camion_id}`},p=>{
        truck={...truck,...p.new};
        renderC();
      }).subscribe((status) => {
        if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          toast('⚠ Error de conexión con rastreo en tiempo real');
        }
      });
  }

  // Load deliveries for this client
  const {data:devs}=await sb.from('entregas').select('*').eq('cliente_id',session.user.id).order('created_at',{ascending:false}).limit(5);
  myDeliveries=devs||[];

  renderC();
})();

let clientMap = null;

function renderC(){
  const c=document.getElementById('content');
  const latest=myDeliveries[0];
  if(latest) {
    clientMap = null;
    c.innerHTML=renderDone(latest);
  } else if(truck) {
    if (!document.getElementById('map-canvas')) {
      c.innerHTML=renderTracking(truck);
      initClientMap();
    } else {
      updateClientMapData();
    }
  } else {
    clientMap = null;
    c.innerHTML='<div class="loading">SIN ENTREGAS ASIGNADAS HOY</div>';
  }
}

function initClientMap() {
  const canvas = document.getElementById('map-canvas');
  if (!canvas || !truck) return;
  clientMap = new TakamiMap('map-canvas');
  updateClientMapData(true);
}

function updateClientMapData(firstLoad = false) {
  if (!clientMap || !truck) return;
  // Actualizar marcador y centrar
  clientMap.updateTruckMarker(truck, true);
  // Dibujar ruta
  clientMap.drawTruckRoute(truck);
}

function renderTracking(t){
  const paradas=t.paradas||[];
  const hechas=t.paradas_completadas||[];
  const idx=t.parada_actual||0;
  const prog=t.progreso||0;
  const steps=[
    {l:'Pedido confirmado',s:'Orden procesada en bodega',done:true},
    {l:'Cargue en bodega',s:'Verificación de temperatura y sellos',done:true},
    {l:'En camino',s:`${t.nombre||'Camión'} en ruta`,done:true},
    {l:'Llegando a tu punto',s:paradas[idx]?.nombre||paradas[idx]||'Tu punto',done:false,act:true},
    {l:'Entrega completada',s:'Pendiente de confirmación',done:false},
  ];
  return `
  <div class="eta">
    <div style="font-size:11px;font-family:var(--font);letter-spacing:3px;color:var(--cyan);text-transform:uppercase;margin-bottom:6px">Estado en tiempo real</div>
    <div style="font-size:52px;font-weight:800;font-family:var(--font);line-height:1">${prog}%</div>
    <div style="font-size:14px;color:var(--text2);font-family:var(--font);margin-top:2px">Ruta completada</div>
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px;font-size:13px">
      <span class="pulse"></span><span>${t.nombre||'Camión'} en camino hacia tu punto</span>
    </div>
  </div>
  
  <div class="sec">Ruta en tiempo real</div>
  <div class="mwrap" style="margin-bottom: 12px;">
    <div id="map-canvas" style="height: 240px; width: 100%; background: #111820; border-radius: 14px; border: 1px solid var(--border);"></div>
  </div>

  <div class="sec">Estado de tu entrega</div>
  <div class="tl">
    <div class="tl-line"></div>
    ${steps.map(s=>`<div class="tl-item">
      <div class="tl-dot ${s.done?'td':s.act?'ta':'tp'}"></div>
      <div style="font-size:14px;font-weight:600;font-family:var(--font);color:${s.done?'var(--green)':s.act?'var(--cyan)':'var(--text3)'}">${s.l}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:2px">${s.s}</div>
    </div>`).join('')}
  </div>
  <div class="sec">Tu camión asignado</div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
      <div>
        <div style="font-size:15px;font-weight:700;font-family:var(--font)">${t.nombre||'—'}</div>
        <div style="font-size:12px;color:var(--text3);font-family:var(--font)">${t.conductor||'—'} · ${t.placa||'—'}</div>
      </div>
      <span class="badge ${t.estado==='en_ruta'?'bg':'ba'}">${t.estado==='en_ruta'?'EN RUTA':'DETENIDO'}</span>
    </div>
    <div style="display:flex;gap:8px">
      <span class="badge bc">🌡 ${t.temperatura||'—'}°C</span>
      <span class="badge ${(t.temperatura||0)<=-18?'bg':'br'}">${(t.temperatura||0)<=-18?'CADENA FRÍA OK':'⚠ TEMP ALERTA'}</span>
    </div>
  </div>
  <div class="card" style="text-align:center;padding:16px">
    <div style="font-size:12px;color:var(--text3);margin-bottom:6px">¿Tienes alguna novedad?</div>
    <div style="font-size:20px;font-weight:800;font-family:var(--font);color:var(--cyan);letter-spacing:1px">📞 (601) 800-TAKAMI</div>
    <div style="font-size:11px;color:var(--text3);font-family:var(--font);margin-top:4px">Línea de despacho 6am – 8pm</div>
  </div>`;
}

function renderDone(d){
  const fotos=Array.isArray(d.fotos)?d.fotos:[];
  return `
  <div style="background:var(--gbg);border:1.5px solid var(--green);border-radius:var(--r2);padding:18px;margin-bottom:14px;text-align:center">
    <div style="font-size:36px;margin-bottom:6px">✅</div>
    <div style="font-size:22px;font-weight:800;font-family:var(--font);color:var(--green)">¡Entrega completada!</div>
    <div style="font-size:13px;color:var(--text2);margin-top:4px">Orden ${d.numero_orden||'—'} · ${d.hora||'—'}</div>
  </div>
  <div class="sec">Detalle de tu entrega</div>
  <div class="card">
    ${[['Orden',d.numero_orden||'—'],['Camión',d.camion||'—'],['Conductor',d.conductor||'—'],['Punto',d.punto_entrega||'—'],['Receptor',d.receptor||'—'],['Temperatura',(d.temperatura||'—')+'°C'],['Fotografías',fotos.length+' adjuntas']].map(([l,v])=>`<div class="or"><span style="color:var(--text3)">${l}</span><span>${v}</span></div>`).join('')}
  </div>
  ${fotos.length?`<div class="sec">Fotos de la entrega</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px">
    ${fotos.map(url=>`<img src="${url}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--r);border:1px solid var(--border)">`).join('')}
  </div>`:''}
  <div class="card" style="text-align:center">
    <div style="font-size:12px;color:var(--text3)">¿Algo no está bien con tu entrega?</div>
    <div style="font-size:18px;font-weight:700;font-family:var(--font);color:var(--cyan);margin-top:6px">📞 (601) 800-TAKAMI</div>
  </div>`;
}

async function doLogout(){await sb.auth.signOut();sessionStorage.clear();location.href='index.html';}
function toast(msg){document.querySelectorAll('.toast').forEach(t=>t.remove());const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);}
</script>
</body>
</html>
