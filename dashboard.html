function renderWaypoints() {
  const container = document.getElementById('dynamic-wps');
  if (!container) return;
  container.innerHTML = '';

  if (waypoints.length === 0) {
    container.innerHTML = `
      <div class="p-4 border border-dashed border-[#3d6880]/30 rounded-[10px] text-center text-[#3d6880] text-xs">
        Sin paradas intermedias. Haz clic en el mapa para añadir o presiona "Agregar Parada".
      </div>
    `;
    return;
  }

  waypoints.forEach((wp, idx) => {
    const item = document.createElement('div');
    item.className = 'bg-[#083040]/30 border border-[#00c8e8]/15 rounded-[10px] p-2.5 flex flex-col gap-1.5 relative';
    item.innerHTML = `
      <div class="flex items-center justify-between">
        <span class="text-[9px] px-1.5 py-0.5 rounded bg-[#00c8e8]/10 text-[#00c8e8] border border-[#00c8e8]/20 font-bold tracking-[0.5px]">📍 PARADA INTERMEDIA ${idx + 1}</span>
        <div class="flex gap-1">
          <button class="w-6 h-6 rounded border border-[#00c8e8]/10 bg-[#062030] text-[#7aa8be] hover:text-white hover:bg-[#0a3a52] hover:border-[#00c8e8] text-[10px] flex items-center justify-center transition-all" onclick="moveUp(${idx})" title="Subir">▲</button>
          <button class="w-6 h-6 rounded border border-[#00c8e8]/10 bg-[#062030] text-[#7aa8be] hover:text-white hover:bg-[#0a3a52] hover:border-[#00c8e8] text-[10px] flex items-center justify-center transition-all" onclick="moveDown(${idx})" title="Bajar">▼</button>
          <button class="w-6 h-6 rounded border border-[#00c8e8]/10 bg-[#062030] text-[#7aa8be] hover:text-[#ff4d4d] hover:bg-[#ff4d4d]/10 hover:border-[#ff4d4d] text-[10px] flex items-center justify-center transition-all" onclick="deleteWaypoint(${idx})" title="Eliminar">🗑</button>
        </div>
      </div>
      <input class="w-full px-3 py-1.5 mt-1 bg-[#083040] border border-[#00c8e8]/15 rounded-[8px] text-[#e8f6ff] text-xs font-bold outline-none focus:border-[#00c8e8] transition-colors" value="${wp.nombre}" onchange="updateWpField(${idx}, 'nombre', this.value)" placeholder="Nombre del punto">

    `;
    container.appendChild(item);
  });
}

function updateWpField(idx, field, value) {
  if (waypoints[idx]) {
    waypoints[idx][field] = value;
  }
}

async function addDefaultWaypoint() {
  const offsetLat = (Math.random() - 0.5) * 0.03;
  const offsetLng = (Math.random() - 0.5) * 0.03;
  const lat = PLANTA_COORDS[0] + offsetLat;
  const lng = PLANTA_COORDS[1] + offsetLng;
  
  toast("🔍 Buscando dirección cercana...");
  const direccion = await reverseGeocode(lat, lng);
  const count = waypoints.length + 1;
  
  waypoints.push({
    lat: lat,
    lng: lng,
    nombre: `Parada ${count}`,
    direccion: direccion,
    hora: '—',
    instrucciones: 'Entrega estándar de cadena de frío.'
  });
  
  renderWaypoints();
  refreshMapRoute();
}

function moveUp(idx) {
  if (idx === 0) return;
  const temp = waypoints[idx];
  waypoints[idx] = waypoints[idx - 1];
  waypoints[idx - 1] = temp;
  renderWaypoints();
  refreshMapRoute();
}

function moveDown(idx) {
  if (idx === waypoints.length - 1) return;
  const temp = waypoints[idx];
  waypoints[idx] = waypoints[idx + 1];
  waypoints[idx + 1] = temp;
  renderWaypoints();
  refreshMapRoute();
}

function deleteWaypoint(idx) {
  waypoints.splice(idx, 1);
  renderWaypoints();
  refreshMapRoute();
}

function refreshMapRoute() {
  if (!mapInstance) return;
  mapInstance.initRouting(
    PLANTA_COORDS, 
    PLANTA_COORDS, 
    waypoints, 
    (newWps) => {
      waypoints = newWps;
      renderWaypoints();
    }
  );
}

async function onCamionChange() {
  const id = document.getElementById('sel-camion').value;
  if (!id) {
    waypoints = [];
    document.getElementById('route-name').value = '';
    renderWaypoints();
    refreshMapRoute();
    return;
  }

  const camion = camiones.find(c => c.id === id);
  if (camion) {
    let paradas = Array.isArray(camion.paradas) ? camion.paradas : [];
    if (paradas.length >= 2 && paradas[0].nombre === PLANTA_NAME && paradas[paradas.length - 1].nombre === PLANTA_NAME) {
      waypoints = paradas.slice(1, -1);
    } else {
      waypoints = [...paradas];
    }
    
    document.getElementById('route-name').value = `Ruta ${camion.nombre}`;
    renderWaypoints();
    refreshMapRoute();
  }
}

async function reverseGeocode(lat, lng) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`, {
      headers: { 'Accept-Language': 'es' }
    });
    const data = await res.json();
    if (data && data.address) {
      const road = data.address.road || '';
      const houseNumber = data.address.house_number || '';
      const suburb = data.address.suburb || data.address.neighbourhood || '';
      return `${road} ${houseNumber} ${suburb}`.trim() || data.display_name;
    }
    return `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
  } catch (e) {
    return `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
  }
}

async function saveRoute() {
  const camionId = document.getElementById('sel-camion').value;
  const routeName = document.getElementById('route-name').value.trim();

  if (!camionId) { toast("⚠ Selecciona un camión"); return; }
  if (!routeName) { toast("⚠ Ponle un nombre a la ruta"); return; }

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = "Guardando...";

  const fullStops = [
    { nombre: PLANTA_NAME, direccion: PLANTA_DIR, lat: PLANTA_COORDS[0], lng: PLANTA_COORDS[1], hora: '06:00', instrucciones: 'Salida de la Planta Principal' },
    ...waypoints,
    { nombre: PLANTA_NAME, direccion: PLANTA_DIR, lat: PLANTA_COORDS[0], lng: PLANTA_COORDS[1], hora: '—', instrucciones: 'Retorno a Planta Central' }
  ];

  try {
    const { error: routeErr } = await sb.from('rutas').insert({
      camion_id: camionId,
      nombre: routeName,
      origen: { nombre: PLANTA_NAME, direccion: PLANTA_DIR, lat: PLANTA_COORDS[0], lng: PLANTA_COORDS[1] },
      destino: { nombre: PLANTA_NAME, direccion: PLANTA_DIR, lat: PLANTA_COORDS[0], lng: PLANTA_COORDS[1] },
      paradas: waypoints
    });

    if (routeErr) throw routeErr;

    const { error: truckErr } = await sb.from('camiones').update({
      paradas: fullStops,
      parada_actual: 0,
      paradas_completadas: [],
      progreso: 0,
      ultima_actualizacion: new Date().toISOString()
    }).eq('id', camionId);

    if (truckErr) throw truckErr;

    toast("✅ Ruta guardada y despachada con éxito");
  } catch (e) {
    toast(`❌ Error: ${e.message}`);
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = "Guardar Ruta";
  }
}

async function loadTruckData() {
  const { data } = await sb.from('camiones').select('*').eq('id', truckId).single();
  if (data) {
    truck = data;
    renderDriverView();
  }
}

function subscribeDriverRealtime() {
  sb.channel('truck-' + truckId)
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'camiones', filter: `id=eq.${truckId}` }, payload => {
      truck = { ...truck, ...payload.new };
      renderDriverView();
    }).subscribe();

  sb.channel('alerts-cond')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'alertas', filter: `camion_id=eq.${truckId}` }, payload => {
      pendingAlert = payload.new.mensaje;
      renderDriverView();
      setTimeout(() => sb.from('alertas').update({ leida: true }).eq('id', payload.new.id), 10000);
    }).subscribe();
}

function startGPS() {
  if (!navigator.geolocation) return;
  const send = () => navigator.geolocation.getCurrentPosition(p => {
    sb.from('camiones').update({
      lat: p.coords.latitude,
      lng: p.coords.longitude,
      ultima_actualizacion: new Date().toISOString()
    }).eq('id', truckId).then(() => {});
  }, () => {});
  send();
  gpsTimer = setInterval(send, 30000);
}

function switchDriverTab(tabName) {
  driverTab = tabName;
  document.querySelectorAll('.nb, button[id^="tab-"]').forEach(b => {
    b.classList.remove('text-[#00c8e8]', 'border-[#00c8e8]');
    b.classList.add('text-[#3d6880]', 'border-transparent');
  });
  const activeBtn = document.getElementById('tab-' + tabName);
  if (activeBtn) {
    activeBtn.classList.remove('text-[#3d6880]', 'border-transparent');
    activeBtn.classList.add('text-[#00c8e8]', 'border-[#00c8e8]');
  }
  renderDriverView();
}

function renderDriverView() {
  const container = document.getElementById('driver-content');
  if (!container || !truck) return;

  if (driverTab === 'ruta') {
    container.innerHTML = renderDriverRuta();
  } else if (driverTab === 'form') {
    container.innerHTML = renderDriverForm();

}

window.submitDelivery = async function() {
  const orden = document.getElementById('f-order')?.value.trim();
  const nombre = document.getElementById('f-name')?.value.trim();
  const cedula = document.getElementById('f-id')?.value.trim();
  const obs = document.getElementById('f-obs')?.value.trim();
  
  if (!orden || !nombre) { toast('⚠ Completa orden y receptor'); return; }
  if (!photoFiles.some(Boolean)) { toast('⚠ Adjunta al menos 1 foto'); return; }

  const btn = document.getElementById('btn-submit');
  btn.textContent = 'Subiendo fotos...';
  btn.disabled = true;

  try {
    const urls = [];
    for (let i = 0; i < photoFiles.length; i++) {
      const file = photoFiles[i];
      if (!file) continue;
      const path = `entregas/${truckId}/${Date.now()}_${i}.jpg`;
      const { error: upErr } = await sb.storage.from('fotos-entregas').upload(path, file, { contentType: 'image/jpeg' });
      if (upErr) throw upErr;
      const { data: { publicUrl } } = sb.storage.from('fotos-entregas').getPublicUrl(path);
      urls.push(publicUrl);
    }

    const paradas = truck.paradas || [];
    const idx = truck.parada_actual || 0;
    const stop = paradas[idx];

    const { error: insErr } = await sb.from('entregas').insert({
      numero_orden: orden,
      receptor: nombre,
      cedula: cedula,
      observaciones: obs,
      temperatura: formTemp,
      fotos: urls,
      camion: truck.nombre,
      camion_id: truckId,
      conductor: user.nombre || '',
      punto_entrega: stop?.nombre || stop || '',
      hora: new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' }),
      estado: 'completado'
    });
    if (insErr) throw insErr;

    // Alerta al panel
    await sb.from('alertas').insert({
      tipo: 'entrega',
      titulo: `Entrega completada — ${truck.nombre}`,
      mensaje: `Orden ${orden} entregada a ${nombre}. Temp: ${formTemp}°C`,
      camion_id: truckId,
      leida: false
    });

    // Avanzar parada
    const hechas = [...(truck.paradas_completadas || [])];
    if (!hechas.includes(idx)) hechas.push(idx);
    const siguiente = idx + 1 < paradas.length ? idx + 1 : idx;
    const progreso = Math.round(hechas.length / Math.max(paradas.length, 1) * 100);

    await sb.from('camiones').update({
      parada_actual: siguiente,
      paradas_completadas: hechas,
      progreso: progreso,
      ultima_entrega: new Date().toISOString()
    }).eq('id', truckId);

    truck = { ...truck, parada_actual: siguiente, paradas_completadas: hechas, progreso: progreso };

    if (formTemp > -18) {
      await sb.from('alertas').insert({
        tipo: 'temperatura',
        titulo: `⚠ Temperatura alta en entrega — ${truck.nombre}`,
        mensaje: `Orden ${orden} entregada a ${formTemp}°C`,
        camion_id: truckId,
        leida: false
      });
    }

    photoFiles = [null, null, null];
    formTemp = -18;
    toast('✅ Entrega registrada con éxito');
    setTimeout(() => switchDriverTab('ruta'), 1500);
  } catch (e) {
    toast('⚠ Error: ' + e.message);
    btn.textContent = '✅ Confirmar entrega y enviar reporte';
    btn.disabled = false;
  }
};

async function setupCliente(container) {
  // Renderizar interfaz principal de cliente (100% móvil sin márgenes de escritorio)
  container.className = "w-full h-full flex flex-col bg-[#041824]";
  container.innerHTML = `
    <div class="w-full h-screen flex flex-col bg-[#041824] text-[#e8f6ff] overflow-hidden">
      <!-- Topbar -->
      <div class="flex-shrink-0 h-[52px] px-4 bg-[#062030] border-b border-[#00c8e8]/15 flex items-center justify-between w-full">
        <div class="font-condensed text-[22px] font-extrabold tracking-wider">TAKAMI<span class="text-[#00c8e8]">.</span></div>
        <div class="flex items-center gap-2.5">
          <div class="text-right">
            <div class="text-[12px] font-condensed text-[#00c8e8] font-bold" id="client-name">—</div>
            <div class="text-[10px] font-condensed text-[#7aa8be] uppercase font-semibold leading-none mt-0.5">CLIENTE</div>
          </div>
          <button onclick="doLogout()" class="text-[11px] font-condensed text-[#3d6880] hover:text-[#ff4d4d] border border-[#00c8e8]/10 hover:border-[#ff4d4d] rounded px-2 py-1 transition-all">Salir</button>
        </div>
      </div>

      <!-- Content Area -->
      <div class="flex-1 overflow-y-auto flex flex-col w-full custom-scrollbar" id="client-content">
        <div class="flex justify-center py-12"><div class="w-8 h-8 border-4 border-[#00c8e8]/20 border-t-[#00c8e8] rounded-full animate-spin"></div></div>
      </div>
    </div>
  `;

  document.getElementById('client-name').textContent = user.nombre || 'Cliente';

  // 1. Cargar camión asignado al cliente
  if (user.camion_id) {
    const { data } = await sb.from('camiones').select('*').eq('id', user.camion_id).single();
    if (data) truck = data;
    
    // Suscripción a cambios del camión
    sb.channel('cli-truck')
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'camiones', filter: `id=eq.${user.camion_id}` }, p => {
        truck = { ...truck, ...p.new };
        renderClientView();
      }).subscribe(status => {
        if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
          toast('⚠ Error de conexión con rastreo en tiempo real');

  // 2. Cargar entregas del cliente
  const { data: devs } = await sb.from('entregas').select('*').eq('cliente_id', user.id).order('created_at', { ascending: false }).limit(5);
  myDeliveries = devs || [];

  renderClientView();
}

        ${steps.map(s => `
          <div class="flex items-start gap-4 relative">
            <div class="w-4.5 h-4.5 rounded-full border-2 border-[#062030] z-10 flex-shrink-0 flex items-center justify-center ${s.done ? 'bg-[#00e676]' : s.act ? 'bg-[#00c8e8] shadow-[0_0_8px_#00c8e8]' : 'bg-[#083040]' }">
              ${s.done ? '<div class="w-1.5 h-1.5 bg-[#041824] rounded-full"></div>' : ''}
            </div>
            <div class="flex flex-col gap-0.5">
              <span class="text-xs font-bold ${s.done ? 'text-[#00e676]' : s.act ? 'text-[#00c8e8]' : 'text-[#3d6880]'}">${s.l}</span>
              <span class="text-[10px] text-[#7aa8be]">${s.s}</span>
            </div>
          </div>
        `).join('')}
      </div>

      <!-- Camión Info Card -->
      <div class="bg-[#062030] border border-[#00c8e8]/15 rounded-xl p-3.5 flex flex-col gap-2">
        <div class="flex justify-between items-center">
          <div>
            <div class="text-xs font-bold text-[#e8f6ff]">${truck.nombre || '—'}</div>
            <div class="text-[10px] text-[#7aa8be]">${truck.conductor || '—'} · ${truck.placa || '—'}</div>
          </div>
          <span class="text-[9px] px-1.5 py-0.5 rounded font-bold border ${truck.estado === 'en_ruta' ? 'bg-[#00e676]/10 text-[#00e676] border-[#00e676]/20' : 'bg-[#ffab00]/10 text-[#ffab00] border-[#ffab00]/20'}">${truck.estado === 'en_ruta' ? 'EN RUTA' : 'DETENIDO'}</span>
        </div>
        <div class="flex gap-2">
          <span class="text-[9px] px-1.5 py-0.5 rounded bg-[#00c8e8]/10 text-[#00c8e8] border border-[#00c8e8]/20 font-bold">🌡 ${truck.temperatura || '—'}°C</span>
          <span class="text-[9px] px-1.5 py-0.5 rounded font-bold ${truck.temperatura <= -18 ? 'bg-[#00e676]/10 text-[#00e676] border-[#00e676]/20' : 'bg-[#ff4d4d]/10 text-[#ff4d4d] border-[#ff4d4d]/20'}">${truck.temperatura <= -18 ? 'CADENA FRÍA OK' : '⚠ TEMP ALERTA'}</span>
        </div>
      </div>

      <!-- Support Card -->
      <div class="bg-[#062030] border border-[#ff4d4d]/10 rounded-xl p-3 text-center flex flex-col gap-0.5 mt-1 mb-6">
        <div class="text-[10px] text-[#3d6880] font-condensed tracking-wider">¿DUDAS O CONTINGENCIAS?</div>
        <a href="tel:601800725264" class="text-lg font-extrabold text-[#00c8e8] font-condensed tracking-wider hover:underline">📞 (601) 800-TAKAMI</a>
        <div class="text-[9px] text-[#3d6880]">Línea de soporte 6:00 AM – 8:00 PM</div>
      </div>
    </div>
  `;
}

function initClientTrackingMap() {
  const canvas = document.getElementById('map-canvas');
  if (!canvas || !truck) return;
  mapInstance = new TakamiMap('map-canvas');
  updateClientTrackingMapData(true);
}

function updateClientTrackingMapData() {
  if (!mapInstance || !truck) return;
  mapInstance.updateTruckMarker(truck, true);
  mapInstance.drawTruckRoute(truck);
}

// Cierre de Sesión e Interfaces
function toast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = document.createElement('div');
  t.className = 'toast fixed bottom-20 left-1/2 -translate-x-1/2 bg-[#062030] border border-[#00c8e8] text-[#00c8e8] px-5 py-2.5 rounded-full text-xs z-[400] font-condensed tracking-wider shadow-[0_4px_24px_rgba(0,200,232,0.2)] animate-pulse whitespace-nowrap';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

async function doLogout() {
  if (gpsTimer) clearInterval(gpsTimer);
  await sb.auth.signOut();
  sessionStorage.clear();
  location.href = 'index.html';
}

// Inyección de métodos y variables locales a ámbito global para invocaciones onclick
window.doLogout = doLogout;
window.switchDriverTab = switchDriverTab;
window.renderDriverRuta = renderDriverRuta;
window.renderDriverForm = renderDriverForm;
window.renderDriverTemp = renderDriverTemp;
window.renderClientTracking = renderClientTracking;
window.renderSlots = function() {
  return [0,1,2].map(i => {
    const file = photoFiles[i];
    const url = file ? URL.createObjectURL(file) : null;
    return `
      <div class="aspect-square border border-dashed border-[#00c8e8]/20 rounded-lg flex flex-col items-center justify-center gap-1.5 cursor-pointer bg-[#083040] relative overflow-hidden text-[10px] text-[#3d6880]">
        <input type="file" accept="image/*" capture="environment" class="absolute inset-0 opacity-0 cursor-pointer" onchange="addPhoto(${i}, this)">
        ${url ? `<img src="${url}" class="absolute inset-0 w-full h-full object-cover"><div class="absolute inset-0 bg-[#00e676]/60 flex items-center justify-center text-lg">✓</div>` : `<span class="text-xl">📷</span><span>Foto ${i+1}</span>`}
      </div>
    `;
  }).join('');
};

// Vinculación de redimensionamiento de pantalla
window.addEventListener('resize', () => {
  if (mapInstance && mapInstance.map) {
    mapInstance.map.invalidateSize();
  }
});
</script>
</body>
</html>
