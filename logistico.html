<!DOCTYPE html>
<html lang="es">
<head>

<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {

          bg: '#041824',

<!-- Leaflet & Custom Map Module -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<script src="takami-map.js"></script>
<style>
  /* Custom scrollbars for cyber theme */
  .custom-scrollbar::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  .custom-scrollbar::-webkit-scrollbar-track {
    background: #041824;
  }
  .custom-scrollbar::-webkit-scrollbar-thumb {
    background: rgba(0, 200, 232, 0.2);
    border-radius: 3px;

  .custom-scrollbar::-webkit-scrollbar-thumb:hover {

</style>
</head>
<body class="bg-[#041824] text-[#e8f6ff] font-sans h-screen w-screen overflow-hidden">
<div class="h-screen w-screen flex flex-col lg:flex-row bg-[#041824] text-[#e8f6ff] overflow-hidden">
  
  <!-- Sidebar -->
  <aside class="contents lg:flex lg:flex-col lg:w-[400px] lg:h-screen lg:bg-[#062030] lg:border-r lg:border-[#00c8e8]/15 lg:order-1 flex-shrink-0">
    <!-- Topbar -->
    <div class="order-1 flex-shrink-0 h-[52px] px-4 bg-[#062030] border-b border-[#00c8e8]/15 flex items-center justify-between w-full">
      <div class="font-condensed text-[22px] font-extrabold tracking-wider">TAKAMI<span class="text-[#00c8e8]">.</span></div>
      <div class="flex items-center gap-2.5">
        <div class="text-right">
          <div class="text-[10px] font-condensed tracking-[2.5px] text-[#00c8e8] uppercase font-bold leading-none mb-0.5">Logística</div>
          <div class="text-[12px] font-condensed text-[#7aa8be] font-semibold" id="uname">—</div>
        </div>
        <button onclick="doLogout()" class="text-[11px] font-condensed text-[#3d6880] hover:text-[#ff4d4d] border border-[#00c8e8]/10 hover:border-[#ff4d4d] rounded px-2 py-1 transition-all">Salir</button>
      </div>
    </div>

    <!-- Scrollable content -->
    <div class="order-3 flex-1 overflow-y-auto p-4 flex flex-col gap-3 w-full bg-[#041824] lg:bg-transparent custom-scrollbar">
      
      <!-- Asignación de Ruta -->
      <div class="font-condensed text-[11px] font-bold tracking-[2px] text-[#3d6880] uppercase mt-1 px-0.5">Asignación de Ruta</div>
      <div class="bg-[#062030] border border-[#00c8e8]/15 rounded-[14px] p-3.5 flex flex-col gap-2 shadow-inner">
        <div>
          <label class="block text-[10px] font-bold font-condensed tracking-[1.5px] text-[#3d6880] uppercase mb-1">Camión Asignado</label>
          <select id="sel-camion" onchange="onCamionChange()" class="w-full px-3 py-2 bg-[#083040] border border-[#00c8e8]/15 rounded-[10px] text-[#e8f6ff] text-xs outline-none focus:border-[#00c8e8] transition-colors">
            <option value="">Selecciona un camión...</option>
          </select>
        </div>
        <div>
          <label class="block text-[10px] font-bold font-condensed tracking-[1.5px] text-[#3d6880] uppercase mb-1">Nombre de la Ruta</label>
          <input id="route-name" placeholder="Ej. Ruta Norte - Entregas AM" class="w-full px-3 py-2 bg-[#083040] border border-[#00c8e8]/15 rounded-[10px] text-[#e8f6ff] text-xs outline-none focus:border-[#00c8e8] transition-colors placeholder-[#3d6880]">
        </div>
      </div>

      <!-- Puntos de la Ruta -->
      <div class="font-condensed text-[11px] font-bold tracking-[2px] text-[#3d6880] uppercase mt-1 px-0.5">Puntos de la Ruta</div>
      <div id="wp-list" class="flex flex-col gap-2">
        <!-- Origen Fijo -->
        <div class="bg-[#00e676]/5 border border-[#00e676]/20 rounded-[10px] p-2.5 flex flex-col gap-1.5">
          <div class="flex items-center justify-between">
            <span class="text-[9px] px-1.5 py-0.5 rounded bg-[#00e676]/10 text-[#00e676] border border-[#00e676]/20 font-bold tracking-[0.5px]">🏭 ORIGEN REQUERIDO</span>
            <span class="text-[11px] text-[#3d6880] font-condensed">Punto Bloqueado</span>
          </div>
          <div class="text-[13px] font-bold">Planta Principal Takami</div>
          <div class="text-[11px] text-[#7aa8be]">Cra. 36 #10-45, Bogotá D.C.</div>
        </div>

        <!-- Contenedor de paradas dinámicas -->
        <div id="dynamic-wps" class="flex flex-col gap-2"></div>

        <!-- Destino Fijo -->
        <div class="bg-[#ff4d4d]/5 border border-[#ff4d4d]/20 rounded-[10px] p-2.5 flex flex-col gap-1.5">
          <div class="flex items-center justify-between">
            <span class="text-[9px] px-1.5 py-0.5 rounded bg-[#ff4d4d]/10 text-[#ff4d4d] border border-[#ff4d4d]/20 font-bold tracking-[0.5px]">🏁 DESTINO REQUERIDO</span>
            <span class="text-[11px] text-[#3d6880] font-condensed">Punto Bloqueado</span>
          </div>
          <div class="text-[13px] font-bold">Planta Principal Takami</div>
          <div class="text-[11px] text-[#7aa8be]">Cra. 36 #10-45, Bogotá D.C.</div>
        </div>
      </div>

      <!-- Acciones -->
      <div class="flex gap-2 mt-2 mb-6 flex-shrink-0">
        <button onclick="addDefaultWaypoint()" class="flex-1 py-2.5 px-4 rounded-[10px] bg-transparent text-[#7aa8be] border border-[#00c8e8]/15 hover:bg-[#083040] transition-colors font-condensed text-sm font-bold uppercase tracking-wider">➕ Agregar Parada</button>
        <button id="btn-save" onclick="saveRoute()" class="flex-1 py-2.5 px-4 rounded-[10px] bg-[#00c8e8] text-[#041824] hover:bg-[#00a0c0] transition-colors font-condensed text-sm font-bold uppercase tracking-wider disabled:opacity-50 disabled:cursor-not-allowed">💾 Guardar Ruta</button>
      </div>

    </div>
  </aside>

  <!-- Map -->
  <main class="order-2 flex-1 relative h-[350px] sm:h-[400px] lg:h-screen w-full flex-shrink-0 lg:flex-shrink">
    <div id="map-canvas" class="w-full h-full bg-[#111820]"></div>
    <div class="absolute bottom-2 left-2 z-[1000] bg-[#041826]/90 border border-[#00c8e8]/15 rounded-md px-2 py-1 text-[10px] font-condensed text-[#7aa8be] pointer-events-none shadow-lg">
      💡 Haz clic en el mapa para agregar paradas
    </div>
  </main>

</div>

<script>
const SURL = 'https://lwdvwwvcshdxfvvsiscc.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3ZHZ3d3Zjc2hkeGZ2dnNpc2NjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1OTYxMjQsImV4cCI6MjA5NTE3MjEyNH0.Yq-5ZrQVnKaGBuMreQUSukNb637I-aJ5xL-NwMboHk0';
const sb = supabase.createClient(SURL, SKEY);

// Planta Coordenadas Fijas (Bogotá Zona Industrial)
const PLANTA_COORDS = [4.6465, -74.1018];
const PLANTA_NAME = "Planta Principal Takami";
const PLANTA_DIR = "Cra. 36 #10-45, Bogotá D.C.";

let user = null;
let camiones = [];
let waypoints = []; // Arreglo de paradas intermedias: [{lat, lng, nombre, direccion}]
let mapInstance = null;

// Control de Acceso y Carga Inicial
(async () => {
  const {data:{session}} = await sb.auth.getSession();
  if (!session) { location.href='index.html'; return; }
  
  user = JSON.parse(sessionStorage.getItem('takami_user')||'{}');
  if (user.rol !== 'logistico') { location.href='index.html'; return; }
  
  document.getElementById('uname').textContent = user.nombre || 'Analista';

  // Cargar camiones para selector
  const {data:cms} = await sb.from('camiones').select('*').order('nombre');
  camiones = cms || [];
  
  const select = document.getElementById('sel-camion');
  camiones.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = `${c.nombre} (${c.placa})`;
    select.appendChild(opt);
  });

  // Inicializar mapa
  mapInstance = new TakamiMap('map-canvas', PLANTA_COORDS, 13);
  
  // Agregar escucha de clics en el mapa
  mapInstance.onMapClick(async (latlng) => {
    toast("🔍 Obteniendo dirección...");
    const direccion = await reverseGeocode(latlng.lat, latlng.lng);
    const count = waypoints.length + 1;
    
    waypoints.push({
      lat: latlng.lat,
      lng: latlng.lng,
      nombre: `Parada ${count}`,
      direccion: direccion,
      hora: '—',
      instrucciones: 'Entrega estándar de cadena de frío.'
    });
    
    renderWaypoints();
    refreshMapRoute();
  });

  renderWaypoints();
  refreshMapRoute();
})();

// Cargar la ruta actual del camión seleccionado
async function onCamionChange() {
  const id = document.getElementById('sel-camion').value;
  if (!id) {
    waypoints = [];
    document.getElementById('route-name').value = '';
    renderWaypoints();
    refreshMapRoute();
    return;
  }

  const camion = camiones.find(c => c.id === id);
  if (camion) {
    // Si el camión tiene paradas, las cargamos, excluyendo origen y destino si ya vienen modelados
    // En Takami, paradas es un array JSONB.
    let paradas = Array.isArray(camion.paradas) ? camion.paradas : [];
    
    // Filtrar si tienen la planta al principio y al final para evitar duplicaciones
    if (paradas.length >= 2 && paradas[0].nombre === PLANTA_NAME && paradas[paradas.length - 1].nombre === PLANTA_NAME) {
      waypoints = paradas.slice(1, -1);
    } else {
      waypoints = [...paradas];
    }
    
    document.getElementById('route-name').value = `Ruta ${camion.nombre}`;
    renderWaypoints();
    refreshMapRoute();
  }
}

// Renderizar la lista de paradas dinámicas
function renderWaypoints() {
  const container = document.getElementById('dynamic-wps');
  container.innerHTML = '';

  if (waypoints.length === 0) {
    container.innerHTML = `
      <div class="p-4 border border-dashed border-[#3d6880]/30 rounded-[10px] text-center text-[#3d6880] text-xs">
        Sin paradas intermedias. Haz clic en el mapa para añadir o presiona "Agregar Parada".
      </div>
    `;
    return;
  }

  waypoints.forEach((wp, idx) => {
    const item = document.createElement('div');
    item.className = 'bg-[#083040]/30 border border-[#00c8e8]/15 rounded-[10px] p-2.5 flex flex-col gap-1.5 relative';
    item.innerHTML = `
      <div class="flex items-center justify-between">
        <span class="text-[9px] px-1.5 py-0.5 rounded bg-[#00c8e8]/10 text-[#00c8e8] border border-[#00c8e8]/20 font-bold tracking-[0.5px]">📍 PARADA INTERMEDIA ${idx + 1}</span>
        <div class="flex gap-1">
          <button class="w-6 h-6 rounded border border-[#00c8e8]/10 bg-[#062030] text-[#7aa8be] hover:text-white hover:bg-[#0a3a52] hover:border-[#00c8e8] text-[10px] flex items-center justify-center transition-all" onclick="moveUp(${idx})" title="Subir">▲</button>
          <button class="w-6 h-6 rounded border border-[#00c8e8]/10 bg-[#062030] text-[#7aa8be] hover:text-white hover:bg-[#0a3a52] hover:border-[#00c8e8] text-[10px] flex items-center justify-center transition-all" onclick="moveDown(${idx})" title="Bajar">▼</button>
          <button class="w-6 h-6 rounded border border-[#00c8e8]/10 bg-[#062030] text-[#7aa8be] hover:text-[#ff4d4d] hover:bg-[#ff4d4d]/10 hover:border-[#ff4d4d] text-[10px] flex items-center justify-center transition-all" onclick="deleteWaypoint(${idx})" title="Eliminar">🗑</button>
        </div>
      </div>
      <input class="w-full px-3 py-1.5 mt-1 bg-[#083040] border border-[#00c8e8]/15 rounded-[8px] text-[#e8f6ff] text-xs font-bold outline-none focus:border-[#00c8e8] transition-colors" value="${wp.nombre}" onchange="updateWpField(${idx}, 'nombre', this.value)" placeholder="Nombre del punto">
      <input class="w-full px-3 py-1.5 bg-[#083040] border border-[#00c8e8]/15 rounded-[8px] text-[#7aa8be] text-[11px] outline-none focus:border-[#00c8e8] transition-colors" value="${wp.direccion}" onchange="updateWpField(${idx}, 'direccion', this.value)" placeholder="Dirección / Indicación">
    `;
    container.appendChild(item);
  });
}

// Actualizar un campo de la parada en el estado
function updateWpField(idx, field, value) {
  if (waypoints[idx]) {
    waypoints[idx][field] = value;
  }
}

// Agregar parada por defecto
async function addDefaultWaypoint() {
  // Coordenada ligeramente aleatoria cerca de la planta para que no se superpongan
  const offsetLat = (Math.random() - 0.5) * 0.03;
  const offsetLng = (Math.random() - 0.5) * 0.03;
  const lat = PLANTA_COORDS[0] + offsetLat;
  const lng = PLANTA_COORDS[1] + offsetLng;
  
  toast("🔍 Buscando dirección cercana...");
  const direccion = await reverseGeocode(lat, lng);
  const count = waypoints.length + 1;
  
  waypoints.push({
    lat: lat,
    lng: lng,
    nombre: `Parada ${count}`,
    direccion: direccion,
    hora: '—',
    instrucciones: 'Entrega estándar de cadena de frío.'
  });
  
  renderWaypoints();
  refreshMapRoute();
}

// Reordenamiento y Borrado
function moveUp(idx) {
  if (idx === 0) return;
  const temp = waypoints[idx];
  waypoints[idx] = waypoints[idx - 1];
  waypoints[idx - 1] = temp;
  renderWaypoints();
  refreshMapRoute();
}

function moveDown(idx) {
  if (idx === waypoints.length - 1) return;
  const temp = waypoints[idx];
  waypoints[idx] = waypoints[idx + 1];
  waypoints[idx + 1] = temp;
  renderWaypoints();
  refreshMapRoute();
}

function deleteWaypoint(idx) {
  waypoints.splice(idx, 1);
  renderWaypoints();
  refreshMapRoute();
}

// Actualizar Enrutamiento en el Mapa
function refreshMapRoute() {
  if (!mapInstance) return;
  mapInstance.initRouting(
    PLANTA_COORDS, 
    PLANTA_COORDS, 
    waypoints, 
    (newWps) => {
      // Callback invocado cuando los waypoints se arrastran en el mapa
      waypoints = newWps;
      renderWaypoints();
    }
  );
}

// Consulta Nominatim para geocodificación inversa (100% Free)
async function reverseGeocode(lat, lng) {
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`, {
      headers: { 'Accept-Language': 'es' }
    });
    const data = await res.json();
    if (data && data.address) {
      const road = data.address.road || '';
      const houseNumber = data.address.house_number || '';
      const suburb = data.address.suburb || data.address.neighbourhood || '';
      return `${road} ${houseNumber} ${suburb}`.trim() || data.display_name;
    }
    return `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
  } catch (e) {
    return `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
  }
}

// Guardar en la Base de Datos
async function saveRoute() {
  const camionId = document.getElementById('sel-camion').value;
  const routeName = document.getElementById('route-name').value.trim();

  if (!camionId) { toast("⚠ Selecciona un camión"); return; }
  if (!routeName) { toast("⚠ Ponle un nombre a la ruta"); return; }

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = "Guardando...";

  // Construir la ruta completa: [Planta (Inicio), ...paradas_intermedias, Planta (Fin)]
  const fullStops = [
    { nombre: PLANTA_NAME, direccion: PLANTA_DIR, lat: PLANTA_COORDS[0], lng: PLANTA_COORDS[1], hora: '06:00', instrucciones: 'Salida de la Planta Principal' },
    ...waypoints,
    { nombre: PLANTA_NAME, direccion: PLANTA_DIR, lat: PLANTA_COORDS[0], lng: PLANTA_COORDS[1], hora: '—', instrucciones: 'Retorno a Planta Central' }
  ];

  try {
    // 1. Guardar en la tabla de rutas
    const { error: routeErr } = await sb.from('rutas').insert({
      camion_id: camionId,
      nombre: routeName,
      origen: { nombre: PLANTA_NAME, direccion: PLANTA_DIR, lat: PLANTA_COORDS[0], lng: PLANTA_COORDS[1] },
      destino: { nombre: PLANTA_NAME, direccion: PLANTA_DIR, lat: PLANTA_COORDS[0], lng: PLANTA_COORDS[1] },
      paradas: waypoints
    });

    if (routeErr) throw routeErr;

    // 2. Actualizar el camión correspondiente con la nueva ruta para el conductor en tiempo real
    const { error: truckErr } = await sb.from('camiones').update({
      paradas: fullStops,
      parada_actual: 0,
      paradas_completadas: [],
      progreso: 0,
      ultima_actualizacion: new Date().toISOString()
    }).eq('id', camionId);

    if (truckErr) throw truckErr;

    toast("✅ Ruta guardada y despachada con éxito");
  } catch (e) {
    toast(`❌ Error: ${e.message}`);
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = "Guardar Ruta";
  }
}

// Cierre de Sesión e Interfaces
function toast(msg){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');
  t.className='toast fixed bottom-20 left-1/2 -translate-x-1/2 bg-[#062030] border border-[#00c8e8] text-[#00c8e8] px-5 py-2.5 rounded-full text-xs z-[400] font-condensed tracking-wider shadow-[0_4px_24px_rgba(0,200,232,0.2)] animate-pulse whitespace-nowrap';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}
async function doLogout(){await sb.auth.signOut();sessionStorage.clear();location.href='index.html';}

// Resize event to recalculate map container size on viewport change
window.addEventListener('resize', () => {
  if (mapInstance && mapInstance.map) {
    mapInstance.map.invalidateSize();
  }
});
</script>
</body>
